<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance PWA</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1220">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b1220;
  color: #e5e7eb;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 16px;
}

.header {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.card {
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 14px;
  padding: 12px;
}

.kpi {
  font-size: 20px;
  font-weight: 700;
}

.small {
  color: #94a3b8;
  font-size: 12px;
}

canvas {
  margin-top: 16px;
  background: #0f172a;
  border-radius: 12px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">💰 Finance Dashboard PWA</div>

<div class="grid">
  <div class="card">
    <div class="small">Yearly Spending</div>
    <div class="kpi" id="yearly">$0</div>
  </div>

  <div class="card">
    <div class="small">Current Month</div>
    <div class="kpi" id="month">$0</div>
  </div>

  <div class="card">
    <div class="small">Bills</div>
    <div class="kpi" id="count">0</div>
  </div>
</div>

<div class="card" style="margin-top:12px;">
  <div class="small">Expense Categories</div>
  <div id="categories"></div>
</div>

<canvas id="chart"></canvas>

</div>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
